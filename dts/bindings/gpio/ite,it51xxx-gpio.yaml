description: This binding gives a base representation of the it51xxx series gpio

compatible: "ite,it51xxx-gpio"

include: [gpio-controller.yaml, base.yaml]

properties:
  reg:
    required: true

  has-volt-sel:
    type: array
    description: |
      Selection of support input voltage 3.3V or 1.8V.

  wucctrl:
    type: phandles
    description: |

gpio-cells:
  - pin
  - flags
