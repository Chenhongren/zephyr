description: ITE Interrupt controller
compatible: "ite,it51xxx-intc"

include: [interrupt-controller.yaml, base.yaml]

properties:
  reg:
    required: true

  isr-reg:
    type: array

  ier-reg:
    type: array

  ielmr-reg:
    type: array

  ipolr-reg:
    type: array

interrupt-cells:
  - irq
  - flags
